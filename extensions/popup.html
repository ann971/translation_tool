<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>API 簽名工具</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>API 請求簽名工具</h1>

    <div id="params"></div>
    <button id="add">＋新增參數</button>

    <div class="section">
      <label>簽名方式：</label>
      <label><input type="radio" name="signMethod" value="sha1" checked /> SHA1</label>
      <label><input type="radio" name="signMethod" value="hmac-sha256" /> HMAC-SHA256</label>
    </div>

    <div class="section">
      <label>密鑰參數名稱：</label>
      <input type="text" id="secretKey" placeholder="如 api_secret" />
    </div>

    <div class="section">
      <label>API Secret：</label>
      <input type="text" id="secret" placeholder="輸入密鑰" />
    </div>

    <button id="submit">送出</button>

    <div class="section">
      <label>簽名字串：</label>
      <pre id="signStr"></pre>
    </div>

    <div class="section">
      <label>簽名結果：</label>
      <pre id="signature"></pre>
    </div>

    <div class="section">
      <label>請求內容：</label>
      <pre id="payload"></pre>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
